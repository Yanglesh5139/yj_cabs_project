<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YJ Cabs | Premium Ride Booking</title>
    <link rel="icon" href="{{ url_for('static', path='YJ_Cabs_logo_design.png') }}" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f4fa 0%, #e6edf4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* Booking Container */
        .booking-container {
            max-width: 950px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        /* Ride Confirmation Container (Initially Hidden) */
        .confirmation-container {
            display: none;
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Section */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            background: #4CAF50;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            80% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .checkmark svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: fadeInUp 0.5s ease-out 0.2s both;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
            animation: fadeInUp 0.5s ease-out 0.4s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Content Section */
        .content {
            padding: 40px;
        }

        /* Ride Details */
        .ride-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .detail-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.5s ease-out 0.6s both;
        }

        .detail-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .detail-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .detail-label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        /* Driver Section */
        .driver-section {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            animation: fadeInUp 0.5s ease-out 0.8s both;
        }

        .driver-photo {
            width: 100px;
            height: 100px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .driver-info {
            flex: 1;
        }

        .driver-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .driver-rating {
            color: #ffc107;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .car-details {
            color: #666;
            font-size: 0.9em;
        }

        .contact-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .contact-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        /* Animated Road Section */
        .road-section {
            background: #2c3e50;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
            animation: fadeInUp 0.5s ease-out 1s both;
        }

        .road {
            position: relative;
            background: #34495e;
            height: 200px;
            border-radius: 10px;
            overflow: hidden;
        }

        .road-lines {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                #fff 0px,
                #fff 20px,
                transparent 20px,
                transparent 40px
            );
            animation: moveLines 1s linear infinite;
        }

        @keyframes moveLines {
            from {
                background-position: 0 0;
            }
            to {
                background-position: 40px 0;
            }
        }

        .car {
            position: absolute;
            bottom: 60px;
            left: -100px;
            font-size: 60px;
            animation: drive 8s linear infinite, bounce 0.5s ease-in-out infinite;
        }

        @keyframes drive {
            0% {
                left: -100px;
            }
            100% {
                left: calc(100% + 50px);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .buildings {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            height: 100px;
            display: flex;
            gap: 10px;
            padding: 0 20px;
        }

        .building {
            background: #1a252f;
            width: 60px;
            height: 80px;
            border-radius: 5px 5px 0 0;
            position: relative;
        }

        .building::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 20px;
            background: repeating-linear-gradient(
                90deg,
                #f39c12 0px,
                #f39c12 5px,
                transparent 5px,
                transparent 15px
            );
        }

        .building:nth-child(2) { height: 100px; }
        .building:nth-child(4) { height: 70px; }
        .building:nth-child(6) { height: 90px; }

        .cloud {
            position: absolute;
            background: white;
            width: 60px;
            height: 30px;
            border-radius: 30px;
            top: 20px;
            animation: floatCloud 20s linear infinite;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud::before {
            width: 30px;
            height: 30px;
            top: -15px;
            left: 10px;
        }

        .cloud::after {
            width: 40px;
            height: 40px;
            top: -20px;
            left: 25px;
        }

        @keyframes floatCloud {
            from {
                left: -100px;
            }
            to {
                left: calc(100% + 100px);
            }
        }

        .eta-timer {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-top: 20px;
            animation: fadeInUp 0.5s ease-out 1.2s both;
        }

        .timer-value {
            font-size: 2em;
            font-weight: bold;
            margin-top: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            animation: fadeInUp 0.5s ease-out 1.4s both;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        /* Booking Form Styles */
        .yjcabs-header {
            padding: 1.75rem 2rem 1rem 2rem;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            background: #ffffff;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-text h1 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #000000 0%, #2c2c2c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-text p {
            font-size: 0.8rem;
            color: #5f6c7a;
            font-weight: 500;
        }

        .booking-content {
            padding: 2rem;
        }

        .book-ride-primary {
            background: #000000;
            border: none;
            width: 100%;
            padding: 1rem;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .book-ride-primary:hover {
            background: #1f1f1f;
            transform: scale(1.01);
        }

        .ride-form-panel {
            margin-top: 1.8rem;
            background: #f9fbfd;
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid #eef2f8;
            transition: all 0.3s ease;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c3e4e;
            margin-bottom: 0.5rem;
        }

        select, .find-ride-btn {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 1rem;
            border: 1px solid #cfdfed;
            background: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }

        .find-ride-btn {
            background: #0066CC;
            color: white;
            font-weight: 700;
            border: none;
            margin-top: 0.5rem;
        }

        .find-ride-btn:hover {
            background: #004e99;
        }

        .rides-results {
            margin-top: 2rem;
            border-top: 1px solid #e4ebf2;
            padding-top: 1.5rem;
        }

        .results-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #1a2c3e;
        }

        .ride-option-card {
            background: white;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid #eef2f6;
            transition: all 0.2s;
            cursor: pointer;
        }

        .ride-option-card:hover {
            border-color: #cbdde9;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .ride-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ride-type {
            font-weight: 800;
            font-size: 1.2rem;
        }

        .ride-desc {
            font-size: 0.8rem;
            color: #5e727f;
        }

        .price-area {
            text-align: right;
        }

        .price-value {
            font-weight: 800;
            font-size: 1.5rem;
            color: #000;
        }

        .select-ride {
            background: #000000;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .no-results, .loading {
            text-align: center;
            padding: 2rem;
            background: #f8fafc;
            border-radius: 1.2rem;
            color: #5b6e82;
        }

        .back-btn {
            margin-top: 20px;
            text-align: center;
        }

        .back-to-booking {
            background: #666;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 0.9em;
        }

        footer {
            background: #ffffff;
            padding: 1rem 2rem;
            border-top: 1px solid #eef2f6;
            font-size: 0.7rem;
            text-align: center;
            color: #6c7e8c;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .driver-section {
                flex-direction: column;
                text-align: center;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Booking Container -->
    <div id="bookingContainer" class="booking-container">
        <div class="yjcabs-header">
            <div class="brand">
                <div class="brand-icon">
                    <img src="{{ url_for('static', path='YJ_Cabs_logo_design.png') }}" alt="YJ Cabs Logo">
                </div>
                <div class="brand-text">
                    <h1>YJ Cab Service</h1>
                    <p>business • premium • reliable</p>
                </div>
            </div>
        </div>

        <div class="booking-content">
            <button id="bookRideBtn" class="book-ride-primary">
                ✨ Book a ride
            </button>

            <div id="rideFormPanel" class="ride-form-panel hidden">
                <div class="form-group">
                    <label>📍 Origin (pickup)</label>
                    <select id="originSelect">
                        <option value="" disabled selected>— Select pickup location —</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🏁 Destination</label>
                    <select id="destinationSelect">
                        <option value="" disabled selected>— Select destination —</option>
                    </select>
                </div>
                <button id="findRideBtn" class="find-ride-btn">🔍 Find my ride</button>
            </div>

            <div id="ridesResultsContainer" class="rides-results"></div>
        </div>
        <footer>
            <span>© yjcabs Professional | Your one true ride companion</span>
        </footer>
    </div>

    <!-- Ride Confirmation Container (Initially Hidden) -->
    <div id="confirmationContainer" class="confirmation-container">
        <div class="header">
            <div class="checkmark">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                </svg>
            </div>
            <h1>Ride Confirmed! 🚗</h1>
            <p>Your cab is on its way to your location</p>
        </div>

        <div class="content">
            <div class="ride-details" id="confirmationDetails">
                <!-- Dynamic content will be inserted here -->
            </div>

            <div class="driver-section" id="driverSection">
                <!-- Dynamic driver content -->
            </div>

            <div class="road-section">
                <div class="road">
                    <div class="buildings">
                        <div class="building"></div>
                        <div class="building"></div>
                        <div class="building"></div>
                        <div class="building"></div>
                        <div class="building"></div>
                        <div class="building"></div>
                    </div>
                    <div class="cloud" style="animation-delay: 0s; top: 30px;"></div>
                    <div class="cloud" style="animation-delay: 5s; top: 60px; left: 200px;"></div>
                    <div class="cloud" style="animation-delay: 10s; top: 40px;"></div>
                    <div class="car">
                        🚗
                    </div>
                    <div class="road-lines"></div>
                </div>
            </div>

            <div class="eta-timer">
                <div>Your driver will arrive in</div>
                <div class="timer-value" id="timer">5:00</div>
                <div style="font-size: 0.9em; margin-top: 10px;">Track your ride in real-time</div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="trackRide()">
                    📍 Track Your Ride
                </button>
                <button class="btn btn-secondary" onclick="shareRide()">
                    📱 Share Ride Status
                </button>
                <button class="btn btn-secondary" onclick="callSupport()">
                    🆘 Need Help?
                </button>
            </div>
            
            <div class="back-btn">
                <button class="back-to-booking" onclick="goBackToBooking()">
                    ← Book Another Ride
                </button>
            </div>
        </div>
    </div>

    <script>
        const API = {
            locations: '/api/locations',
            vehicles: '/api/vehicle-types',
            estimate: '/api/estimate',
            book: '/api/book'
        };

        let currentEstimates = [];
        let currentRideData = null;

        // Timer variables
        let timeInSeconds = 300;
        let timerInterval = null;

        async function fetchLocations() {
            try {
                const response = await fetch(API.locations);
                const data = await response.json();
                return data.locations;
            } catch (error) {
                console.error('Error fetching locations:', error);
                return ["Downtown Financial District", "Airport - JFK", "Silicon Valley Hub", "Midtown Manhattan"];
            }
        }

        async function populateLocationDropdowns() {
            const locations = await fetchLocations();
            const originSelect = document.getElementById('originSelect');
            const destSelect = document.getElementById('destinationSelect');

            originSelect.innerHTML = '<option value="" disabled selected>— Select pickup location —</option>';
            destSelect.innerHTML = '<option value="" disabled selected>— Select destination —</option>';

            locations.forEach(loc => {
                originSelect.add(new Option(loc, loc));
                destSelect.add(new Option(loc, loc));
            });

            originSelect.addEventListener('change', () => {
                if (destSelect.value === originSelect.value && originSelect.value) {
                    alert("Origin and destination must be different.");
                    destSelect.value = "";
                }
            });
            destSelect.addEventListener('change', () => {
                if (originSelect.value === destSelect.value && destSelect.value) {
                    alert("Origin and destination must be different.");
                    originSelect.value = "";
                }
            });
        }

        async function findRides() {
            const origin = document.getElementById('originSelect').value;
            const destination = document.getElementById('destinationSelect').value;

            if (!origin || !destination) {
                alert("Please select both origin and destination");
                return;
            }
            if (origin === destination) {
                alert("Origin and destination cannot be the same");
                return;
            }

            const container = document.getElementById('ridesResultsContainer');
            container.innerHTML = '<div class="loading">⏳ Calculating fares with real-time pricing...</div>';

            const formData = new URLSearchParams();
            formData.append('origin', origin);
            formData.append('destination', destination);

            try {
                const response = await fetch(API.estimate, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await response.json();
                currentEstimates = data.estimates;
                renderRideOptions(origin, destination, currentEstimates);
            } catch (error) {
                console.error('Error fetching estimates:', error);
                container.innerHTML = '<div class="no-results">⚠️ Error fetching ride options. Please try again.</div>';
            }
        }

        function renderRideOptions(origin, destination, estimates) {
            const container = document.getElementById('ridesResultsContainer');

            if (!estimates.length) {
                container.innerHTML = '<div class="no-results">No ride options available</div>';
                return;
            }

            const resultsHtml = `
            <div class="results-title">
                🚖 Available rides — ${origin} → ${destination}
            </div>
            ${estimates.map(ride => `
                <div class="ride-option-card" data-vehicle='${JSON.stringify(ride)}'>
                    <div class="ride-info">
                        <div class="ride-type">${ride.vehicle_type}</div>
                        <div class="ride-desc">${ride.description} • ${ride.distance_miles.toFixed(1)} mi • ${ride.duration_minutes} min</div>
                        <div class="ride-desc">💰 Base: $${ride.base_fare.toFixed(2)} + Distance: $${ride.distance_fare.toFixed(2)} + Time: $${ride.time_fare.toFixed(2)}</div>
                        <div class="ride-desc">⚡ Surge: ${ride.surge_multiplier.toFixed(2)}x</div>
                    </div>
                    <div class="price-area">
                        <div class="price-value">$${ride.estimated_fare.toFixed(2)}</div>
                        <button class="select-ride" data-ride='${JSON.stringify(ride)}'>Select & Confirm</button>
                    </div>
                </div>
            `).join('')}
        `;
            container.innerHTML = resultsHtml;

            document.querySelectorAll('.select-ride').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const ride = JSON.parse(btn.getAttribute('data-ride'));
                    await bookRide(origin, destination, ride);
                });
            });
        }

        async function bookRide(origin, destination, ride) {
            const formData = new URLSearchParams();
            formData.append('origin', origin);
            formData.append('destination', destination);
            formData.append('vehicle_type', ride.vehicle_type);
            formData.append('estimated_fare', ride.estimated_fare);
            formData.append('distance', ride.distance_miles);
            formData.append('duration', ride.duration_minutes);

            try {
                const response = await fetch(API.book, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    // Store ride data for confirmation page
                    currentRideData = {
                        ride_id: data.ride_confirmation.confirmation_number,
                        pickup: origin,
                        dropoff: destination,
                        fare: ride.estimated_fare,
                        vehicle_type: ride.vehicle_type,
                        distance: ride.distance_miles,
                        duration: ride.duration_minutes,
                        driver_name: getRandomDriver(),
                        driver_rating: (4.5 + Math.random() * 0.5).toFixed(1),
                        car_model: getCarModel(ride.vehicle_type),
                        license_plate: generateLicensePlate(),
                        car_color: getRandomColor(),
                        eta_minutes: Math.floor(ride.duration_minutes * 0.3) // Driver ETA is 30% of ride duration
                    };
                    
                    // Show confirmation page
                    showConfirmationPage(currentRideData);
                }
            } catch (error) {
                console.error('Error booking ride:', error);
                alert('Error booking ride. Please try again.');
            }
        }

        function getRandomDriver() {
            const drivers = ['John Anderson', 'Michael Smith', 'David Johnson', 'Robert Brown', 'William Davis'];
            return drivers[Math.floor(Math.random() * drivers.length)];
        }

        function getCarModel(vehicleType) {
            const models = {
                'Economy': 'Toyota Corolla',
                'Standard': 'Honda Accord',
                'Premium': 'Tesla Model 3',
                'Luxury': 'Mercedes-Benz E-Class',
                'SUV': 'Hyundai Tucson'
            };
            return models[vehicleType] || 'Standard Sedan';
        }

        function generateLicensePlate() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const numbers = '0123456789';
            let plate = '';
            for (let i = 0; i < 3; i++) plate += letters.charAt(Math.floor(Math.random() * letters.length));
            plate += '-';
            for (let i = 0; i < 4; i++) plate += numbers.charAt(Math.floor(Math.random() * numbers.length));
            return plate;
        }

        function getRandomColor() {
            const colors = ['Silver', 'Black', 'White', 'Gray', 'Blue', 'Red'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function showConfirmationPage(rideData) {
            // Hide booking container, show confirmation container
            document.getElementById('bookingContainer').style.display = 'none';
            document.getElementById('confirmationContainer').style.display = 'block';
            
            // Populate ride details
            const detailsHtml = `
                <div class="detail-card">
                    <div class="detail-icon">📍</div>
                    <div class="detail-label">Pickup Location</div>
                    <div class="detail-value">${rideData.pickup}</div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">🏁</div>
                    <div class="detail-label">Drop Location</div>
                    <div class="detail-value">${rideData.dropoff}</div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">💰</div>
                    <div class="detail-label">Fare Estimate</div>
                    <div class="detail-value">$${rideData.fare.toFixed(2)}</div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">🚕</div>
                    <div class="detail-label">Ride ID</div>
                    <div class="detail-value">${rideData.ride_id}</div>
                </div>
            `;
            
            document.getElementById('confirmationDetails').innerHTML = detailsHtml;
            
            // Populate driver section
            const driverHtml = `
                <div class="driver-photo">
                    👨‍✈️
                </div>
                <div class="driver-info">
                    <div class="driver-name">${rideData.driver_name}</div>
                    <div class="driver-rating">
                        ${'★'.repeat(Math.floor(rideData.driver_rating))}${'☆'.repeat(5 - Math.floor(rideData.driver_rating))} ${rideData.driver_rating}
                    </div>
                    <div class="car-details">
                        ${rideData.car_model} | License: ${rideData.license_plate} | ${rideData.car_color}
                    </div>
                </div>
                <button class="contact-btn" onclick="contactDriver()">
                    📞 Contact Driver
                </button>
            `;
            
            document.getElementById('driverSection').innerHTML = driverHtml;
            
            // Start timer with actual ETA
            timeInSeconds = rideData.eta_minutes * 60;
            startTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const minutes = Math.floor(timeInSeconds / 60);
                const seconds = timeInSeconds % 60;
                const timerElement = document.getElementById('timer');
                
                if (timerElement) {
                    timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
                
                if (timeInSeconds > 0) {
                    timeInSeconds--;
                } else {
                    clearInterval(timerInterval);
                    if (timerElement) {
                        timerElement.textContent = "Arrived! 🎉";
                        showNotification();
                    }
                }
            }, 1000);
        }

        function goBackToBooking() {
            // Reset and show booking container
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('confirmationContainer').style.display = 'none';
            document.getElementById('bookingContainer').style.display = 'block';
            
            // Reset form
            document.getElementById('originSelect').value = '';
            document.getElementById('destinationSelect').value = '';
            document.getElementById('ridesResultsContainer').innerHTML = '<div class="no-results">✨ Click "Book a ride" to request your trip</div>';
            document.getElementById('rideFormPanel').classList.add('hidden');
            
            // Reset booking button text
            const bookBtn = document.getElementById('bookRideBtn');
            bookBtn.innerHTML = '✨ Book a ride';
            
            // Reset form visibility flag
            window.isFormVisible = false;
        }

        // Functions for confirmation page
        function contactDriver() {
            if (currentRideData) {
                alert(`Calling driver ${currentRideData.driver_name} at +1 (555) 123-4567`);
            }
        }

        function trackRide() {
            if (currentRideData) {
                alert(`Opening live tracking map...\nYour driver is ${(currentRideData.distance * 0.3).toFixed(1)} miles away\nETA: ${Math.floor(timeInSeconds / 60)} minutes`);
            }
        }

        function shareRide() {
            if (currentRideData) {
                const rideDetails = `I've booked a ride with YJ Cabs! 🚗\nRide ID: ${currentRideData.ride_id}\nFrom: ${currentRideData.pickup}\nTo: ${currentRideData.dropoff}\nETA: ${Math.floor(timeInSeconds / 60)} minutes\nTrack my ride: https://yjcabs.com/track/${currentRideData.ride_id}`;
                
                if (navigator.share) {
                    navigator.share({
                        title: 'My YJ Cabs Ride',
                        text: rideDetails,
                    }).catch(console.error);
                } else {
                    alert("Share this ride status:\n\n" + rideDetails);
                    navigator.clipboard.writeText(rideDetails);
                    alert("Ride details copied to clipboard!");
                }
            }
        }

        function callSupport() {
            alert("Connecting to YJ Cabs Support...\nCalling +1 (800) 555-6789");
        }

        function showNotification() {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("Your ride has arrived! 🚗", {
                    body: "Your driver is waiting for you. Please proceed to the pickup location.",
                    icon: "https://via.placeholder.com/64"
                });
            } else if ("Notification" in window) {
                Notification.requestPermission();
            }
            
            alert("🚗 Your driver has arrived! Please proceed to the pickup location.");
        }

        // Initialize booking form
        let isFormVisible = false;
        const bookBtn = document.getElementById('bookRideBtn');
        const formPanel = document.getElementById('rideFormPanel');
        const findBtn = document.getElementById('findRideBtn');

        bookBtn.onclick = () => {
            isFormVisible = !isFormVisible;
            formPanel.classList.toggle('hidden', !isFormVisible);
            if (isFormVisible) {
                document.getElementById('ridesResultsContainer').innerHTML = '<div class="no-results">📍 Select origin/destination and click "Find my ride"</div>';
            }
        };

        findBtn.onclick = findRides;

        // Request notification permission
        if ("Notification" in window && Notification.permission === "default") {
            Notification.requestPermission();
        }

        populateLocationDropdowns();
        document.getElementById('ridesResultsContainer').innerHTML = '<div class="no-results">✨ Click "Book a ride" to request your trip</div>';
    </script>
</body>

</html>
